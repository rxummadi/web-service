# Example: deploy nginx with application-chart
# Resources are named after the release (e.g. helm install nginx -> resources named "nginx")
application-chart:
  image:
    repository: nginx
    tag: "latest"
    pullPolicy: IfNotPresent

  port: 80
  replicaCount: 2

  service:
    type: ClusterIP
    port: 80

  serviceAccount:
    create: true

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi



istio-routes:
  virtualService:
    enabled: true
    # Host to match for routing (can be FQDN or service name)
    hosts:
      - example.local
    gateways:
      - mesh
    http:
      - match:
          - uri:
              prefix: /
        route:
          - destination:
              host: example-service
              port:
                number: 80
            weight: 100

  destinationRule:
    enabled: true
    # Target host/service for the rule
    host: test-example-service
    # Traffic policy (optional)
    trafficPolicy:
      loadBalancer:
        simple: ROUND_ROBIN
    # Subsets for routing (optional). Chart will default subset label `app` to the Helm release name.
    subsets:
      - name: v1
        labels: {}
        trafficPolicy:
          loadBalancer:
            simple: ROUND_ROBIN