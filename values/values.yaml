# Example: deploy nginx with application-chart
# Resources are named after the release (e.g. helm install nginx -> resources named "nginx")

image:
  repository: nginx
  tag: "latest"
  pullPolicy: IfNotPresent

port: 80
replicaCount: 1

service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: true

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
